# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4e864af5b017d5b476b962174d1a7c58"
name = "AEO Optimizer"
application_url = "https://aeo-optimizer.fly.dev"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_online_store_navigation,read_online_store_pages"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[app_proxy]
url = "https://aeo-optimizer.fly.dev/proxy/llms-txt"
subpath = "llms-txt"
prefix = "a"

[auth]
redirect_urls = [
  "https://aeo-optimizer.fly.dev/auth/callback",
  "https://aeo-optimizer.fly.dev/auth/shopify/callback",
  "https://aeo-optimizer.fly.dev/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
