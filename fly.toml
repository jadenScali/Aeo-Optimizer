# fly.toml app configuration file generated for aeo-optimizer on 2026-05-22T15:13:28-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aeo-optimizer'
primary_region = 'yyz'

[build]

[env]
  PORT = '3000'
  SCOPES = 'read_online_store_pages,write_metaobject_definitions,write_metaobjects,write_online_store_navigation,write_products'
  SHOPIFY_API_KEY = '4e864af5b017d5b476b962174d1a7c58'
  SHOPIFY_APP_URL = 'https://aeo-optimizer.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
